# `name:` pins the compose project name regardless of the working directory,
# so renaming the repo dir doesn't orphan the volume / containers.
name: mise

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mise}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mise}
      POSTGRES_DB: ${POSTGRES_DB:-mise}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mise}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mise}:${POSTGRES_PASSWORD:-mise}@postgres:5432/${POSTGRES_DB:-mise}
    ports:
      - "${PORT:-8080}:${PORT:-8080}"

volumes:
  pgdata:
