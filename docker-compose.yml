services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mise-ts-postgres
    environment:
      POSTGRES_USER: mise
      POSTGRES_PASSWORD: mise
      POSTGRES_DB: mise
    ports:
      - "5433:5432"
    volumes:
      - mise_ts_pgdata:/var/lib/postgresql/data

volumes:
  mise_ts_pgdata:
